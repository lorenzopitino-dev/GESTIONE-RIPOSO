<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>appGestione_Riposo</title>
    <style>
      /* Make the html body cover the entire (visual) viewport with no scroll bars. */
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100% }
      #screen { width: 100%; height: 100%; }
    </style>
  </head>
  <body onload="init()">
    <figure style="overflow:visible;" id="qtspinner">
      <center style="margin-top:1.5em; line-height:150%">
        <img src="qtlogo.svg" width="320" height="200" style="display:block"></img>
        <strong>Qt for WebAssembly: appGestione_Riposo</strong>
        <div id="qtstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen"></div>

    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.appGestione_Riposo_entry,
                        containerElements: [screen],
                        
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="qtloader.js"></script>
    <script src="appGestione_Riposo.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script>
    window.generaPDFSpecchio = function(utenti, dati, giorni, inizioBlocco, fineBlocco) {
        try {
            console.log('DEBUG inizioBlocco:', inizioBlocco, typeof inizioBlocco);
            console.log('DEBUG fineBlocco:', fineBlocco, typeof fineBlocco);
            console.log('DEBUG giorni:', giorni);
            console.log('DEBUG utenti count:', utenti ? utenti.length : 'null');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });

        // Calcola solo i giorni nel periodo blocco
            function parseISO(s) {
                if (!s) return null;
                let p = s.split('-');
                return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
            }
            const dInizio = parseISO(inizioBlocco);
            const dFine   = parseISO(fineBlocco);
            const anno    = dInizio.getFullYear();
            const mese    = dInizio.getMonth();
            const nomiGiorno = ['DOM','LUN','MAR','MER','GIO','VEN','SAB'];

            const giorniBlocco = [];
            for (let d = new Date(dInizio); d <= dFine; d.setDate(d.getDate() + 1)) {
                giorniBlocco.push(d.getDate());
            }

        // Intestazione
            doc.setFontSize(14);
            doc.text('SPECCHIO RIPOSI - Periodo Blocco', 14, 15);
            doc.setFontSize(10);
            doc.text('Dal: ' + inizioBlocco + ' Al: ' + fineBlocco, 14, 22);

        // Mappa tipo per colori
            let mapTipo = {};
            for (let i = 0; i < dati.length; i++) {
                let item = dati[i];
                if (!mapTipo[item.u]) mapTipo[item.u] = {};
                mapTipo[item.u][parseInt(item.d)] = item.tipo || '';
            }

            function colorePerTipo(tipo) {
                if (!tipo) return [0,0,0];
                let t = tipo.toUpperCase();
                if (t.indexOf('SETTIMANALE') !== -1) return [244, 67,  54];
                if (t.indexOf('FESTIVO')     !== -1) return [255,152,   0];
                if (t.indexOf('MEDICO')      !== -1) return [ 33,150, 243];
                if (t.indexOf('STUDIO')      !== -1) return [ 51, 51,  51];
                if (t.indexOf('SANGUE')      !== -1) return [139, 69,  19];
                if (t.indexOf('LICENZA')     !== -1) return [156, 39, 176];
                return [76,175, 80];
            }

        // Header tabella
            let headers = [['UTENTE', ...giorniBlocco.map(function(g) {
                return String(g) + '\n' + nomiGiorno[new Date(anno, mese, g).getDay()];
            })]];

        // Righe
            let rows = utenti.map(function(u) {
                let riga = [u];
                for (let i = 0; i < giorniBlocco.length; i++) {
                    let g = giorniBlocco[i];
                    let trovato = null;
                    for (let j = 0; j < dati.length; j++) {
                        if (dati[j].u === u && parseInt(dati[j].d) === g) { trovato = dati[j]; break; }
                    }
                    riga.push(trovato ? (trovato.a || '') : '');
                }
                return riga;
            });

            doc.autoTable({
                head: headers,
                body: rows,
                startY: 28,
                styles: { fontSize: 6, cellPadding: 1, halign: 'center', valign: 'middle' },
                headStyles: { fillColor: [240,240,240], textColor: [0,0,0], fontStyle: 'bold', halign: 'center' },
                columnStyles: { 0: { halign: 'left', cellWidth: 38, fontStyle: 'bold', fontSize: 7 } },
                didParseCell: function(data) {
                    if (data.column.index > 0) {
                        data.cell.styles.cellWidth = 8;
                    }
                    if (data.section === 'body' && data.column.index > 0 && data.cell.raw !== '') {
                        let utente = rows[data.row.index][0];
                        let giorno = giorniBlocco[data.column.index - 1];
                        let tipo = mapTipo[utente] ? (mapTipo[utente][giorno] || '') : '';
                        data.cell.styles.textColor = colorePerTipo(tipo);
                        data.cell.styles.fontStyle = 'bold';
                    }
                }
            });

            doc.save('specchio_riposi_blocco.pdf');
        } catch(e) {
            console.error('PDF error:', e);
        }
    };
    </script>
  </body>
</html>
